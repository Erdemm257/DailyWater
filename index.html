<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Water</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Su Takip">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #090d16;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            width: 100vw;
        }

        .container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            flex-direction: column; /* Dikey dizilim için en önemli komut */
            align-items: center; /* Ortalamak için */
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

            .header h2 {
                margin: 0;
                font-size: 20px;
                letter-spacing: 2px;
                color: #ffffff;
                font-weight: 700;
            }

            .header p {
                margin: 5px 0 0 0; /* Üstten 5px boşluk, diğerlerini sıfırla */
                font-size: 12px;
                color: #64748b;
                text-align: center; /* Yazıyı ortalar */
                width: 100%; /* Satırı tam kaplayıp alt satıra zorlar */
            }

            .header h2 {
                margin: 0;
                font-size: 20px;
                letter-spacing: 2px;
                color: #ffffff;
                font-weight: 700;
            }

        .circle-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: radial-gradient(circle, #111827 70%, #0f172a 100%);
            box-shadow: 0 0 0 6px #1e293b, 0 0 20px rgba(56, 189, 248, 0.2);
            border: 4px solid #38bdf8;
            overflow: hidden;
        }
        .circle-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8); /* Su dolunca yazılar net okunsun diye gölge */
        }

        /* ---- YENİ: SU DALGASI EFEKTİ ---- */
        .water-wave {
            position: absolute;
            left: 50%;
            width: 440px; /* Daireden büyük olmalı ki dalga boyu oluşsun */
            height: 440px;
            bottom: -550px; /* Başlangıçta tamamen boş (Görünmez) */
            transform: translateX(-50%);
            z-index: 1;
            transition: bottom 1s cubic-bezier(0.4, 0, 0.2, 1); /* Yükselme animasyonu yumuşak olsun */
        }

        .layer1 {
            background: rgba(56, 189, 248, 0.5); /* En açık mavi */
            border-radius: 40%;
            animation: spin 6s linear infinite;
        }

        .layer2 {
            background: rgba(2, 132, 199, 0.6); /* Orta mavi */
            border-radius: 43%;
            animation: spin 8s linear infinite;
        }

        .layer3 {
            background: rgba(3, 105, 161, 0.8); /* En koyu mavi arka plan */
            border-radius: 46%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: translateX(-50%) rotate(0deg);
            }

            100% {
                transform: translateX(-50%) rotate(360deg);
            }
        }

        .circle-amount {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .circle-target {
            font-size: 14px;
            color: #64748b;
            margin-top: 6px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .btn-quick {
            background-color: #111827;
            color: #94a3b8;
            border: 1px solid #1e293b;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

            .btn-quick:active {
                background-color: #1e293b;
                color: #38bdf8;
                border-color: #38bdf8;
            }

        .custom-section {
            background-color: #111827;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background-color: #090d16;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .btn-ekle {
            background-color: #0284c7;
            color: white;
        }

            .btn-ekle:active {
                background-color: #0369a1;
            }

        .btn-cikart {
            background-color: #334155;
            color: #f1f5f9;
            border: 1px solid #475569;
        }

            .btn-cikart:active {
                background-color: #475569;
            }

        .btn-save {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

            .btn-save:active {
                background-color: #0369a1;
            }

        .history-section {
            margin-top: 10px;
        }

        .history-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        li {
            background-color: #111827;
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e293b;
            font-size: 14px;
        }

            li .date {
                color: #94a3b8;
                font-weight: 500;
            }

            li .amount {
                color: #ffffff;
                font-weight: 700;
            }
        /* Ayarlar İkonu */
        .settings-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            color: #94a3b8;
            z-index: 10;
        }

        /* Arka plan blur ve karartma */
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px); /* Blur efekti */
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* Açılır Pencere */
        .settings-modal {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            color: white;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

            .settings-header h3 {
                margin: 0;
                font-size: 1.1rem;
                font-weight: 500;
            }

        .close-btn {
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="settingsIcon" class="settings-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </div>

    <div class="container">
        <div class="header">
            <h2>DAILY WATER</h2>
            <p>by erddm</p>
        </div>

        <div class="circle-container">
            <div class="water-wave layer3"></div>
            <div class="water-wave layer2"></div>
            <div class="water-wave layer1"></div>

            <div class="circle-content">
                <div class="circle-amount" id="toplamSu">0.0 Litre</div>
                <div class="circle-target" id="toplamSuMl">0 mL</div>
            </div>
        </div>

        <div class="btn-grid">
            <button class="btn-quick" onclick="suIslem(500, 'ekle')">500 ML</button>
            <button class="btn-quick" onclick="suIslem(1000, 'ekle')">1.0 L</button>
            <button class="btn-quick" onclick="suIslem(1500, 'ekle')">1.5 L</button>
        </div>

        <div class="custom-section">
            <div class="input-wrapper">
                <input type="number" id="customInput" placeholder="Özel miktar (ml)" inputmode="numeric">
            </div>
            <div class="control-buttons">
                <button class="btn-action btn-ekle" onclick="customSuIslem('ekle')">EKLE</button>
                <button class="btn-action btn-cikart" onclick="customSuIslem('cikart')">ÇIKART</button>
            </div>
        </div>

        <button class="btn-save" onclick="gunuKaydet()">GÜNÜ KAYDET</button>



        <div class="history-section">
            <div class="history-title">Geçmiş Kayıtlar</div>
            <ul id="gecmisListe"></ul>
        </div>
    </div>

    <div id="settingsOverlay" class="settings-overlay">
        <div class="settings-modal">
            <div class="settings-header">
                <h3>Ayarlar</h3>
                <span id="closeSettings" class="close-btn">&times;</span>
            </div>
            <div id="settingsContent" class="settings-content">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.85rem; margin-bottom: 8px; color: #94a3b8;">Kullanıcı Adı</label>
                    <input type="text" id="userInput" placeholder="Geçmişi görmek için isim gir..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #111827; color: white; box-sizing: border-box; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.85rem; margin-bottom: 8px; color: #94a3b8;">Günlük Hedef (mL)</label>
                    <input type="number" id="hedefInput" placeholder="Örn: 2500" step="100" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #111827; color: white; box-sizing: border-box; outline: none;">
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
